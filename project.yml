name: TimberVox
options:
  bundleIdPrefix: com.chiejimofor
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    DEVELOPMENT_TEAM: XM69J99HWP
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ALWAYS_SEARCH_USER_PATHS: NO
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    GCC_C_LANGUAGE_STANDARD: gnu17
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
      GCC_PREPROCESSOR_DEFINITIONS: "DEBUG=1 $(inherited)"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      ONLY_ACTIVE_ARCH: YES
      MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: YES
    Release:
      SWIFT_COMPILATION_MODE: wholemodule
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      ENABLE_NS_ASSERTIONS: NO

packages:
  TimberVoxCore:
    path: packages/timbervox-core
  Sauce:
    url: https://github.com/Clipy/Sauce
    branch: master
  Pow:
    url: https://github.com/EmergeTools/Pow
    from: "1.0.6"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.4"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    from: "0.15.4"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.1"
  PermissionPilot:
    url: https://github.com/arpitagarwal1301/PermissionPilot.git
    exactVersion: "0.1.0"

# Shared app settings; per-variant differences are layered in each target below.
targetTemplates:
  MacApp:
    type: application
    platform: macOS
    sources:
      - path: apps/mac/Sources
      - path: apps/mac/Resources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        "CODE_SIGN_IDENTITY[sdk=macosx*]": "Apple Development"
        CURRENT_PROJECT_VERSION: "78"
        DEVELOPMENT_ASSET_PATHS: "\"apps/mac/Resources/Preview Content\""
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_OUTGOING_NETWORK_CONNECTIONS: YES
        ENABLE_PREVIEWS: YES
        ENABLE_RESOURCE_ACCESS_AUDIO_INPUT: YES
        ENABLE_USER_SELECTED_FILES: readwrite
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: TimberVox
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "TimberVox needs microphone access to record and transcribe your voice."
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        PRODUCT_MODULE_NAME: TimberVox
        PRODUCT_NAME: TimberVox
        RUNTIME_EXCEPTION_DISABLE_LIBRARY_VALIDATION: YES
      configs:
        Release:
          SWIFT_EMIT_LOC_STRINGS: YES

targets:
  TimberVox:
    templates: [MacApp]
    settings:
      base:
        AUTOMATION_APPLE_EVENTS: YES
        CODE_SIGN_ENTITLEMENTS: apps/mac/Config/TimberVox.entitlements
        ENABLE_APP_SANDBOX: NO
        INFOPLIST_FILE: apps/mac/Config/Info.plist
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "TimberVox needs automation access to control supported apps while inserting dictation results."
        MARKETING_VERSION: "0.6.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.chiejimofor.timbervox
      configs:
        Debug:
          ENABLE_HARDENED_RUNTIME: NO
        Release:
          ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: TimberVoxCore
      - package: Sauce
      - package: Pow
      - package: FluidAudio
      - package: MarkdownUI
      - package: PermissionPilot
      - package: Sparkle

  TimberVox-AppStore:
    templates: [MacApp]
    settings:
      base:
        AUTOMATION_APPLE_EVENTS: NO
        CODE_SIGN_ENTITLEMENTS: apps/mac/Config/TimberVoxAppStore.entitlements
        ENABLE_APP_SANDBOX: YES
        INFOPLIST_FILE: "apps/mac/Config/Info-AppStore.plist"
        MARKETING_VERSION: "1.0"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) MAS_BUILD"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.chiejimofor.timbervox.debug
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.chiejimofor.timbervox
    dependencies:
      - package: TimberVoxCore
      - package: Sauce
      - package: Pow
      - package: FluidAudio
      - package: MarkdownUI
      - package: PermissionPilot

  TimberVoxTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - apps/mac/Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chiejimofor.timbervox.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: TimberVox

schemes:
  TimberVox:
    build:
      targets:
        TimberVox: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TimberVoxTests
    archive:
      config: Release
  TimberVox-AppStore:
    build:
      targets:
        TimberVox-AppStore: all
    run:
      config: Debug
    archive:
      config: Release
