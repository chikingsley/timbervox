name: TimberVox
options:
  bundleIdPrefix: com.chiejimofor
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    DEVELOPMENT_TEAM: XM69J99HWP
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ALWAYS_SEARCH_USER_PATHS: NO
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      ONLY_ACTIVE_ARCH: YES
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: YES
      EMIT_FRONTEND_COMMAND_LINES: YES
      OTHER_LDFLAGS:
        - "$(inherited)"
        - "-Xlinker"
        - "-interposable"
    Release:
      SWIFT_COMPILATION_MODE: wholemodule
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      ENABLE_NS_ASSERTIONS: NO

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.4.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios.git
    from: "5.43.0"
  Inject:
    url: https://github.com/krzysztofzablocki/Inject.git
    from: "1.6.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    exactVersion: "0.15.5"
  Swiftcn:
    path: ../swiftcn-ui

targets:
  TimberVox:
    type: application
    platform: macOS
    configFiles:
      Debug: Config/TimberVoxAPI.xcconfig
      Release: Config/TimberVoxAPI.xcconfig
    sources:
      - path: TimberVox
        excludes:
          - "TimberVox.entitlements"
    dependencies:
      - package: GRDB
      - package: KeyboardShortcuts
      - package: RevenueCat
      - package: Inject
      - package: FluidAudio
      - package: Swiftcn
    info:
      path: TimberVox/Info.plist
      properties:
        LSUIElement: false
        NSHumanReadableCopyright: "© 2026 Weigh Anchor"
        NSMicrophoneUsageDescription: "TimberVox records your microphone while you dictate."
        NSAudioCaptureUsageDescription: "TimberVox records system audio when you enable it for a dictation mode."
        NSScreenCaptureUsageDescription: "TimberVox captures visible screen context when you enable screen-aware dictation."
        RevenueCatAPIKey: "$(REVENUECAT_API_KEY)"
        TimberVoxAPIKey: "$(TIMBERVOX_API_KEY)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chiejimofor.timbervox
        PRODUCT_NAME: TimberVox
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 79
        CODE_SIGN_ENTITLEMENTS: TimberVox/TimberVox.entitlements
        ENABLE_PREVIEWS: YES
        ENABLE_HARDENED_RUNTIME: YES
        RUNTIME_EXCEPTION_DISABLE_LIBRARY_VALIDATION: YES
      configs:
        Debug:
          ENABLE_HARDENED_RUNTIME: NO
          REVENUECAT_API_KEY: test_zgewzHuIBEYvhqKPPFpeubZVUcY
        Release:
          REVENUECAT_API_KEY: appl_RHctMSgoSTBwUicmLtZNEdyYJHq

  TimberVoxTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TimberVoxTests
    dependencies:
      - target: TimberVox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chiejimofor.timbervox.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  TimberVox:
    build:
      targets:
        TimberVox: all
        TimberVoxTests: [test]
    test:
      targets:
        - TimberVoxTests
    run:
      config: Debug
      commandLineArguments:
        "--skip-onboarding": true
      environmentVariables:
        INJECTION_STANDALONE: "1"
