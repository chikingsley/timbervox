strict: true

included:
  - TimberVox
  - TimberVoxTests

excluded:
  - .build
  - DerivedData
  - old-app
  - TimberVox.xcodeproj
  - TimberVoxAPI

# Apple swift-format owns mechanical layout. SwiftLint owns safety and structure.
disabled_rules:
  - identifier_name
  - line_length
  - opening_brace
  - trailing_comma
  - trailing_whitespace

opt_in_rules:
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - empty_count
  - empty_string
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - sorted_first_last
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - vertical_parameter_alignment_on_call
  - yoda_condition

force_cast:
  severity: error
force_try:
  severity: error
force_unwrapping:
  severity: error
implicitly_unwrapped_optional:
  severity: error

file_length:
  warning: 400
  error: 500

type_body_length:
  warning: 300
  error: 400

function_body_length:
  warning: 60
  error: 100

function_parameter_count:
  warning: 6
  error: 8

cyclomatic_complexity:
  warning: 12
  error: 20

large_tuple:
  warning: 3
  error: 4

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

custom_rules:
  explicit_boolean_comparison:
    name: "Explicit Boolean Comparison"
    regex: "(==|!=)\\s*(true|false)"
    message: "Use the Boolean directly, negate it, or normalize an optional into a named nonoptional fact."
    severity: error
  unsafe_array_subscript_binding:
    name: "Unsafe Array Subscript in Binding"
    regex: "return \\$\\w+\\.\\w+\\.\\w+\\[\\w+\\]"
    message: "Index-based bindings can crash when an array mutates. Use an ID-based Binding(get:set:)."
    severity: error
